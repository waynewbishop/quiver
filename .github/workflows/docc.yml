name: Deploy DocC to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Build DocC
        env:
          BASE_PATH: quiver
        run: |
          xcodebuild docbuild \
            -scheme Quiver \
            -derivedDataPath /tmp/docbuild \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

          ARCHIVE=$(find /tmp/docbuild -name 'Quiver.doccarchive' | head -1)

          $(xcrun --find docc) process-archive transform-for-static-hosting "$ARCHIVE" \
            --hosting-base-path "$BASE_PATH" \
            --output-path ./docs

          # Fix asset paths — docc does not rewrite CSS/JS/baseUrl for hosting-base-path
          find ./docs -name 'index.html' -exec sed -i '' \
            -e "s|baseUrl = \"/\"|baseUrl = \"/${BASE_PATH}/\"|g" \
            -e "s|href=\"/css/|href=\"/${BASE_PATH}/css/|g" \
            -e "s|href=\"/img/|href=\"/${BASE_PATH}/img/|g" \
            -e "s|src=\"/js/|src=\"/${BASE_PATH}/js/|g" \
            -e "s|href=\"/favicon|href=\"/${BASE_PATH}/favicon|g" \
            {} \;

          # Fix webpack public path placeholder in JS bundles
          find ./docs/js -name '*.js' -exec sed -i '' \
            "s|{{BASE_PATH}}|/${BASE_PATH}|g" \
            {} \;

          # Inject page header colors into JSON data
          # DocC only sets standardColorIdentifier when @PageColor is used.
          # We inject it based on page role so every page gets the right color.
          python3 .github/inject-page-colors.py ./docs/data

          # Inject custom CSS
          cp Sources/Quiver/Docs/Quiver.docc/custom.css ./docs/css/custom.css
          find ./docs -name 'index.html' -exec sed -i '' \
            "s|</head>|<link href=\"/${BASE_PATH}/css/custom.css\" rel=\"stylesheet\"></head>|g" \
            {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
